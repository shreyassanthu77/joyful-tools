name: Publish
on:
  workflow_dispatch:
  push:
    tags:
      - "release-*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Install Workspace Deps
        run: deno install

      - name: Run tests
        run: deno task test

  publish-jsr:
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2

      - name: Install Workspace Deps
        run: deno install

      - name: Publish JSR Workspace
        run: deno run -A scripts/publish.ts jsr

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Workspace Deps
        run: deno install

      - name: Build npm Dist Packages
        run: deno run -A scripts/build.ts

      - name: Publish npm Dist Packages
        run: deno run -A scripts/publish.ts npm

name: Publish
on:
  push:
    paths:
      - "deno.jsonc"
      - "packages/**"
      - ".github/workflows/publish.yml"
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Install Packages
        run: deno install

      - name: Run tests
        run: deno task test

  publish-jsr:
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Publish to JSR
        run: npx jsr publish --allow-slow-types

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish @joyful-tools/pipe
        working-directory: packages/pipe
        run: npm publish --access public || true

      - name: Publish @joyful-tools/result
        working-directory: packages/result
        run: npm publish --access public || true

      - name: Publish @joyful-tools/fetch
        working-directory: packages/fetch
        run: npm publish --access public || true
